<svg viewBox="0 0 580 130" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Circle mark -->
  <circle cx="65" cy="65" r="61" fill="white" stroke="#0F172A" stroke-width="4"/>

  <!-- Floppy left ear (dark, behind head) -->
  <ellipse cx="33" cy="70" rx="19" ry="34" fill="#0F172A" transform="rotate(-8 33 70)"/>

  <!-- Head (white, side profile facing right) -->
  <ellipse cx="64" cy="52" rx="28" ry="22" fill="white" stroke="#0F172A" stroke-width="2.5"/>

  <!-- Dark patch — top of head connecting to ear -->
  <path d="M34 38 Q48 28 70 33 Q72 47 62 53 Q48 53 38 46 Z" fill="#0F172A"/>

  <!-- Snout -->
  <ellipse cx="87" cy="58" rx="9" ry="7" fill="white" stroke="#0F172A" stroke-width="2"/>

  <!-- Nose -->
  <ellipse cx="95" cy="57" rx="4" ry="3" fill="#0F172A"/>

  <!-- Eye -->
  <circle cx="68" cy="48" r="4" fill="#0F172A"/>
  <circle cx="69.5" cy="46.5" r="1.6" fill="white"/>

  <!-- Chest / body lower -->
  <ellipse cx="52" cy="97" rx="22" ry="14" fill="white" stroke="#0F172A" stroke-width="2.5"/>

  <!-- Collar -->
  <rect x="33" y="72" width="48" height="9" rx="4.5" fill="#F2C94C" stroke="#0F172A" stroke-width="1.8"/>

  <!-- Medal chain -->
  <line x1="56" y1="81" x2="56" y2="87" stroke="#0F172A" stroke-width="1.5"/>

  <!-- Medal -->
  <circle cx="56" cy="98" r="11" fill="#F2C94C" stroke="#0F172A" stroke-width="1.8"/>
  <text x="56" y="102.5" text-anchor="middle" font-size="13" font-weight="900" fill="#0F172A" font-family="Outfit,sans-serif">B</text>

  <!-- "BELLiO" wordmark -->
  <text x="148" y="82" font-family="Outfit,sans-serif" font-weight="800" font-size="68" fill="#0F172A" letter-spacing="-1">BELL</text>
  <!-- i stem -->
  <text x="384" y="82" font-family="Outfit,sans-serif" font-weight="800" font-size="68" fill="#0F172A" letter-spacing="-1">i</text>
  <!-- i dot (golden) -->
  <circle cx="398" cy="14" r="9" fill="#F2C94C"/>
  <!-- O -->
  <text x="410" y="82" font-family="Outfit,sans-serif" font-weight="800" font-size="68" fill="#0F172A" letter-spacing="-1">O</text>

  <!-- Tagline -->
  <text x="149" y="108" font-family="Outfit,sans-serif" font-weight="400" font-size="20" fill="#4B5563" letter-spacing="0.5">AI Employee Platform</text>
</svg>
